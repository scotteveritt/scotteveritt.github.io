---
layout: default
---
<article itemscope itemtype="https://schema.org/TechArticle">
  <header class="post-header">
    <h1 class="post-title" itemprop="headline">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">{{ page.date | date: "%b %-d, %Y" }}</time>
      {% if page.author %} · <span itemprop="author" itemscope itemtype="https://schema.org/Person"><span itemprop="name">{{ page.author }}</span></span>{% endif %}
    </p>
    {% if page.description %}<meta itemprop="description" content="{{ page.description }}">{% endif %}
  </header>

  <div itemprop="articleBody">
    {{ content }}
  </div>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["TechArticle", "BlogPosting"],
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": {{ page.author | default: site.author.name | jsonify }},
    "url": {{ site.url | jsonify }},
    "sameAs": [
      "https://github.com/scotteveritt",
      "https://dev.to/scotteveritt",
      "https://scotteveritt.hashnode.dev"
    ]
  },
  "publisher": { "@id": "{{ site.url }}/#organization" },
  "url": "{{ page.url | absolute_url }}",
  "mainEntityOfPage": "{{ page.url | absolute_url }}",
  "image": "{{ page.image | default: '/assets/og-image.png' | absolute_url }}",
  {% if page.keywords %}"keywords": {{ page.keywords | jsonify }},{% endif %}
  "inLanguage": "en",
  "isAccessibleForFree": true,
  "articleSection": "Engineering",
  "wordCount": {{ content | number_of_words }}{% if page.mentions %},
  "mentions": [
    {% for item in page.mentions %}
    {
      "@type": "SoftwareSourceCode",
      "name": {{ item.name | jsonify }},
      "codeRepository": {{ item.repo | jsonify }},
      "programmingLanguage": {{ item.lang | jsonify }},
      "description": {{ item.description | jsonify }},
      "license": "https://opensource.org/licenses/MIT"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]{% endif %}
}
</script>

{% if page.faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faq %}
    {
      "@type": "Question",
      "name": {{ item.q | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.a | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
