<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords }}">{% endif %}
  <meta name="author" content="{{ page.author | default: site.author.name }}">
  <meta name="robots" content="index, follow, max-snippet:300">
  <meta name="google-site-verification" content="_RphQ6vHv_xPfrgbMIgxS79rEJ3TeYljl3L_0FTR2vY">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="text/plain" href="{{ '/llms.txt' | absolute_url }}" title="LLM Context">

  {% feed_meta %}
  {% seo %}
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="en_US">
  <meta property="article:author" content="{{ page.author | default: site.author.name }}">
  {% if page.keywords %}{% assign tags = page.keywords | split: ", " %}{% for tag in tags %}<meta property="article:tag" content="{{ tag }}">
  {% endfor %}{% endif %}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "{{ site.url }}/#organization",
    "name": {{ site.title | jsonify }},
    "url": {{ site.url | jsonify }},
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/assets/blog-avatar.png' | absolute_url }}"
    },
    "sameAs": [
      "https://github.com/scotteveritt",
      "https://dev.to/scotteveritt",
      "https://scotteveritt.hashnode.dev"
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "description": {{ site.description | jsonify }},
    "url": {{ site.url | jsonify }},
    "publisher": { "@id": "{{ site.url }}/#organization" },
    "author": {
      "@type": "Person",
      "name": {{ site.author.name | jsonify }},
      "url": {{ site.url | jsonify }},
      "sameAs": [
        "https://github.com/scotteveritt",
        "https://dev.to/scotteveritt",
        "https://scotteveritt.hashnode.dev"
      ]
    }
  }
  </script>

  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
  </header>

  <main class="page-content" role="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>{{ site.title }} &middot; {{ site.author.name }}</p>
    </div>
  </footer>
</body>
</html>
