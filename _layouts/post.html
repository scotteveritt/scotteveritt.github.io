---
layout: default
---
<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}</p>
  </header>

  {{ content }}
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: site.description | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": {{ page.author | default: site.author.name | jsonify }}
  },
  "publisher": {
    "@type": "Person",
    "name": {{ site.author.name | jsonify }}
  },
  "url": "{{ page.url | absolute_url }}",
  "image": "{{ page.image | default: '/assets/og-image.png' | absolute_url }}"
}
</script>
